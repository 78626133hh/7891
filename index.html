<!DOCTYPE html>
<!-- 语言设置：zh-CN 中文，en 英文 -->
<html lang="zh-CN">
<head>
    <!-- 字符编码：必须放在最前面 -->
    <meta charset="UTF-8">
    <!-- 移动端适配：核心标签 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 网页标题：浏览器标签显示 -->
    <title>感谢您的访问</title>
    <!-- 网页描述：SEO 优化 -->
    <meta name="description" content="这是一个正在开发的网站">
    <!-- 网页关键词：SEO 优化 -->
    <meta name="keywords" content="HTML,模板,前端,基础">
    
    <!-- 内部 CSS 样式：写在这里 -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Microsoft YaHei", sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
    </style>
</head>
<body>
    <!-- 页面主体内容：所有可见内容写在这里 -->
    <div class="container">
        <header>
            <h1>网页头部</h1>
        </header>

        <main>
            <section>
                <h2>主要内容区域</h2>
                <p>这是一个通用的 HTML5 模板，可直接修改使用</p>
            </section>
        </main>

        <footer>
            <p>© 2025 网页底部</p>
        </footer>
    </div>

    <!-- JavaScript 脚本：放在 body 末尾，加载更快 -->
    <script>
        // 在这里写 JS 代码
        console.log("HTML 模板加载成功！");
    </script>
</body>
</html>
